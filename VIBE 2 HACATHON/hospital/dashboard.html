<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Dashboard — Golden Hour</title>
  <meta name="description" content="Hospital dashboard for incoming patient management and pre-arrival preparation">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/hospital.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
  <div class="hospital-page">
    <div class="hospital-header">
      <h2>🏥 Hospital Dashboard</h2>
      <div style="display:flex;gap:var(--space-sm);align-items:center">
        <span class="badge badge-green">ER: Ready</span>
        <button class="btn btn-sm btn-outline" onclick="refreshHospital()">🔄 Refresh</button>
      </div>
    </div>

    <div class="hospital-stats" id="hospital-stats">
      <!-- Filled by JS -->
    </div>

    <div class="incoming-section">
      <h3 style="margin-bottom:var(--space-lg)">📋 Incoming Patients</h3>
      <div id="incoming-patients">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../js/hospitals-india.js?v=1"></script>
  <script src="../js/ambulances-india.js?v=1"></script>
  <script src="../js/data.js?v=5"></script>
  <script src="../js/app.js?v=5"></script>
  <script src="../js/map.js?v=5"></script>
  <script src="../js/hospital.js?v=5"></script>
</body>
</html>
