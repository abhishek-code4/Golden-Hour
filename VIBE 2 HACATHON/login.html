<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Golden Hour</title>
  <meta name="description" content="Login or sign up for Golden Hour emergency ambulance dispatch system.">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo">🚑</div>
          <h2>Golden<span style="color:var(--emergency-red)">Hour</span></h2>
          <p>Emergency Response System</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login', this)" id="tab-login">Login</button>
          <button class="auth-tab" onclick="switchTab('signup', this)" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="login-password" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg auth-submit" style="width:100%">
            Login →
          </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signup-form" style="display:none" onsubmit="handleSignup(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-input" id="signup-name" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-input" id="signup-phone" placeholder="+91 XXXXX XXXXX" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="signup-email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="signup-password" placeholder="Create a password" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Select Your Role</label>
            <div class="role-selector">
              <div class="role-option">
                <input type="radio" name="role" id="role-patient" value="patient" checked>
                <label for="role-patient">
                  <span class="role-icon">👤</span>
                  Patient
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="role-dispatcher" value="dispatcher">
                <label for="role-dispatcher">
                  <span class="role-icon">📡</span>
                  Dispatcher
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="role-hospital" value="hospital">
                <label for="role-hospital">
                  <span class="role-icon">🏥</span>
                  Hospital
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="role-admin" value="admin">
                <label for="role-admin">
                  <span class="role-icon">⚙️</span>
                  Admin
                </label>
              </div>
            </div>
          </div>
          <div class="form-group" id="medical-history-group" style="display:none">
            <label class="form-label">Medical History (Optional)</label>
            <textarea class="form-textarea" id="signup-medical" placeholder="Allergies, conditions, blood group..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg auth-submit" style="width:100%">
            Create Account →
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/hospitals-india.js?v=1"></script>
  <script src="js/ambulances-india.js?v=1"></script>
  <script src="js/data.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
  <script src="js/auth.js?v=5"></script>
</body>
</html>
