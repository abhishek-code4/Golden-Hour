<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch Center — Golden Hour</title>
  <meta name="description" content="Emergency dispatch center with live map, ambulance fleet, and request management">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dispatcher.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>

<body>
  <div class="dispatch-page">
    <div class="dispatch-layout">
      <!-- Map Side -->
      <div class="dispatch-map-side">
        <div id="dispatch-map"></div>
        <div class="map-legend">
          <strong style="font-size:0.8rem;margin-bottom:2px">Map Legend</strong>
          <div class="legend-item"><span class="status-dot online"></span> Available</div>
          <div class="legend-item"><span class="status-dot busy"></span> En Route</div>
          <div class="legend-item"><span class="status-dot offline"></span> Offline</div>
          <div class="legend-item"><span class="status-dot emergency"></span> Patient Request</div>
        </div>
      </div>

      <!-- Panel Side -->
      <div class="dispatch-panel">
        <div class="dispatch-panel-header">
          <h3>📡 Dispatch Center</h3>
          <button class="btn btn-sm btn-outline" onclick="refreshData()">🔄 Refresh</button>
        </div>

        <!-- Stats -->
        <div class="dispatch-stats-bar" id="dispatch-stats">
          <!-- Filled by JS -->
        </div>

        <!-- Tabs -->
        <div class="dispatch-tabs">
          <button class="dispatch-tab active" onclick="switchDispatchTab('requests', this)" id="tab-requests">
            🚨 Requests <span class="tab-count" id="request-count">0</span>
          </button>
          <button class="dispatch-tab" onclick="switchDispatchTab('fleet', this)" id="tab-fleet">
            🚑 Fleet
          </button>
          <button class="dispatch-tab" onclick="switchDispatchTab('hospitals', this)" id="tab-hospitals">
            🏥 Hospitals
          </button>
        </div>

        <!-- Content -->
        <div class="dispatch-panel-content" id="dispatch-content">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../js/hospitals-india.js?v=1"></script>
  <script src="../js/ambulances-india.js?v=1"></script>
  <script src="../js/data.js?v=5"></script>
  <script src="../js/app.js?v=5"></script>
  <script src="../js/map.js?v=5"></script>
  <script src="../js/dispatcher.js?v=5"></script>
</body>

</html>
